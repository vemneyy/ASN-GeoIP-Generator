name: Build asn.dat
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */3 * *"
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"
permissions:
  contents: write
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Build and run asn.dat generator
        run: |
          go mod tidy
          go build -o asn-generator ./
          ./asn-generator

      - name: Generate sha256 checksum for release files
        run: |
          cd ./output || exit 1
          sha256sum asn.dat > ./asn.dat.sha256sum
          sha256sum asn-text.zip > ./asn-text.zip.sha256sum

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Purge jsdelivr CDN
        run: |
          cd output || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done

      - name: Upload asn.dat to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./output/asn.dat
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}

      - name: Upload asn.dat.sha256sum to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./output/asn.dat.sha256sum
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}

      - name: Upload asn-text.zip to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./output/asn-text.zip
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}

      - name: Upload asn-text.zip.sha256sum to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./output/asn-text.zip.sha256sum
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
